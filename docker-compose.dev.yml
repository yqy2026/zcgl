version: '3.8'

# 开发环境 - 简化Docker配置
services:
  # 数据库
  database:
    image: postgres:15-alpine
    container_name: asset_db_dev
    environment:
      POSTGRES_DB: asset_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 后端API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: asset_backend_dev
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@database:5432/asset_management
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:5173
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - backend_cache:/app/.cache
    depends_on:
      - database
    restart: unless-stopped
    command: python src/main_simple.py

  # 前端开发服务器
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: asset_frontend_dev
    environment:
      - VITE_API_BASE_URL=http://localhost:8001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_dev_data:
  backend_cache:
  frontend_node_modules:

networks:
  default:
    name: asset_dev_network