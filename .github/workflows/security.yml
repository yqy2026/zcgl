name: Security Scanning

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '30 1 * * 0'  # Weekly on Sunday 1:30 AM UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ===========================
  # Code Scanning Availability
  # ===========================
  code-scanning-availability:
    name: Code Scanning Availability
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.detect.outputs.enabled }}

    steps:
    - name: Detect GitHub code scanning availability
      id: detect
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        STATUS_CODE=$(curl -s -o /tmp/code-scanning-default-setup.json -w "%{http_code}" \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/code-scanning/default-setup")
        set -e

        if [ "${STATUS_CODE}" = "200" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Code scanning is enabled."
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "Code scanning is not enabled (HTTP ${STATUS_CODE}); skip SARIF upload steps."
        fi

  # ===========================
  # CodeQL Analysis
  # ===========================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: code-scanning-availability
    if: needs.code-scanning-availability.outputs.enabled == 'true'

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

  # ===========================
  # Dependency Security Scan
  # ===========================
  dependencies:
    name: Dependency Security
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run Safety check (Python)
      run: |
        pip install safety
        cd backend
        if [ -f pyproject.toml ]; then
          pip install uv
          uv sync || true
        fi
        safety check --json --output ../safety-report.json || true
        safety check || true

    - name: Run npm audit (Node.js)
      run: |
        cd frontend
        npm audit --json > ../npm-audit-report.json || true
        npm audit --audit-level=high || true

    - name: Upload dependency reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-security-reports
        path: |
          safety-report.json
          npm-audit-report.json
        retention-days: 30

  # ===========================
  # Code Security Scan (Bandit)
  # ===========================
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1

    - name: Install Bandit
      run: |
        pip install bandit[toml]

    - name: Run Bandit
      run: |
        cd backend
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ -f txt || true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: backend/bandit-report.json
        retention-days: 30

  # ===========================
  # Trivy Vulnerability Scan
  # ===========================
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: code-scanning-availability

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.24.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      if: needs.code-scanning-availability.outputs.enabled == 'true'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'
