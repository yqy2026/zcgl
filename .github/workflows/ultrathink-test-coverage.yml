name: UltraThink 测试覆盖率自动化流程

on:
  push:
    branches: [ main, develop, feature/*, hotfix/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天凌晨2点执行全面测试
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      backend_only:
        description: '仅运行后端测试'
        required: false
        default: false
        type: boolean
      frontend_only:
        description: '仅运行前端测试'
        required: false
        default: false
        type: boolean
      generate_report:
        description: '生成详细测试报告'
        required: false
        default: true
        type: boolean
      run_performance_tests:
        description: '运行性能测试'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  BACKEND_COVERAGE_THRESHOLD: 75
  FRONTEND_COVERAGE_THRESHOLD: 65
  TOTAL_COVERAGE_THRESHOLD: 70

jobs:
  # 后端测试作业
  backend-tests:
    if: ${{ github.event.inputs.frontend_only != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false
    name: 后端测试 (Python ${{ matrix.python-version }})

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_land_property
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libmagic1 \
          libmagic-dev \
          poppler-utils \
          tesseract-ocr \
          tesseract-ocr-chi-sim \
          tesseract-ocr-chi-tra \
          libgl1-mesa-glx \
          libglib2.0-0 \
          libsm6 \
          libxext6 \
          libxrender-dev \
          libgomp1

    - name: 安装Python依赖
      run: |
        cd backend
        pip install uv
        uv sync --all-extras
        # 安装额外的测试依赖
        uv add --group dev \
          pytest-xdist \
          pytest-benchmark \
          pytest-profiling \
          pytest-mock \
          factory-boy \
          faker \
          pytest-html \
          pytest-json-report

    - name: 设置环境变量
      run: |
        cd backend
        cat << EOF > .env
        DATABASE_URL=postgresql://postgres:test_password@localhost:5432/test_land_property
        REDIS_URL=redis://localhost:6379/0
        ENVIRONMENT=testing
        SECRET_KEY=test_secret_key_for_ci
        ALGORITHM=HS256
        ACCESS_TOKEN_EXPIRE_MINUTES=30
        CORS_ORIGINS=["http://localhost:5173", "http://127.0.0.1:5173"]
        DEV_MODE=true
        EOF

    - name: 数据库迁移
      run: |
        cd backend
        uv run alembic upgrade head

    - name: 运行代码质量检查
      run: |
        cd backend
        echo "🔍 运行代码质量检查..."

        # Ruff代码检查
        echo "▶️ 运行 Ruff 检查..."
        uv run ruff check src/ --output-format=github --show-fixes

        # Ruff格式检查
        echo "▶️ 检查代码格式..."
        uv run ruff format --check src/ || echo "::warning :: 格式问题暂时允许"

        # MyPy类型检查
        echo "▶️ 运行 MyPy 类型检查..."
        uv run mypy src/ --ignore-missing-imports --strict || echo "::warning :: 类型检查问题暂时允许"

    - name: 运行安全检查
      run: |
        cd backend
        echo "🔒 运行安全检查..."

        # Bandit安全扫描
        uv run bandit -r src/ -f json -o bandit-report.json || true
        uv run bandit -r src/ -f txt

        # Safety依赖安全检查
        uv run safety check --json --output safety-report.json || true
        uv run safety check

    - name: 运行关键测试 (P0优先级)
      run: |
        cd backend
        echo "🧪 运行关键测试 (P0优先级)..."

        # 使用优化的pytest配置
        uv run python -m pytest \
          -c pytest_ultra_optimized.ini \
          -m "P0 and not skip_ci" \
          --cov=src \
          --cov-report=xml:coverage-backend-p0.xml \
          --cov-report=html:htmlcov-backend-p0 \
          --junit-xml=test-results-backend-p0.xml \
          --html=test-report-p0.html \
          --self-contained-html \
          -v \
          --tb=short

    - name: 运行完整测试套件
      if: github.event_name == 'schedule' || github.event.inputs.generate_report == 'true'
      run: |
        cd backend
        echo "🧪 运行完整测试套件..."

        uv run python -m pytest \
          -c pytest_ultra_optimized.ini \
          --cov=src \
          --cov-report=xml:coverage-backend.xml \
          --cov-report=html:htmlcov-backend \
          --cov-report=term-missing \
          --junit-xml=test-results-backend.xml \
          --html=test-report-full.html \
          --self-contained-html \
          --benchmark-json=benchmark-results.json \
          -v \
          --tb=short

    - name: 运行性能测试
      if: github.event.inputs.run_performance_tests == 'true' || github.event_name == 'schedule'
      run: |
        cd backend
        echo "⚡ 运行性能基准测试..."

        uv run python -m pytest \
          -c pytest_ultra_optimized.ini \
          -m "performance" \
          --benchmark-only \
          --benchmark-json=benchmark-performance.json \
          --benchmark-sort=mean \
          -v

    - name: 生成覆盖率报告
      run: |
        cd backend
        echo "📊 生成覆盖率报告..."

        # 生成详细的覆盖率报告
        uv run python -m pytest tests/ \
          --cov=src \
          --cov-report=html:coverage-report \
          --cov-report=xml:coverage.xml \
          --cov-fail-under=${{ env.BACKEND_COVERAGE_THRESHOLD }} \
          || true

        # 生成模块级覆盖率
        uv run python -c "
import coverage
cov = coverage.Coverage()
cov.load()
data = cov.get_data()
print('📈 模块覆盖率统计:')
for file_path in data.measured_files():
    if 'src/' in file_path and not file_path.endswith('/__init__.py'):
        lines = data.lines(file_path) or []
        analyzed = coverage.analysis(file_path)
        covered = len(lines)
        total = len(analyzed[1])
        percentage = (covered / total * 100) if total > 0 else 0
        print(f'  {file_path}: {covered}/{total} ({percentage:.1f}%)')
"

    - name: 上传后端测试结果
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-test-results-${{ matrix.python-version }}
        path: |
          backend/coverage.xml
          backend/coverage-report/
          backend/test-results-*.xml
          backend/test-report-*.html
          backend/bandit-report.json
          backend/safety-report.json
          backend/benchmark-results.json
          backend/benchmark-performance.json
          backend/htmlcov-*/
        retention-days: 30

    - name: 上传覆盖率到Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: backend-py${{ matrix.python-version }}
        name: backend-coverage-python${{ matrix.python-version }}
        fail_ci_if_error: false

  # 前端测试作业
  frontend-tests:
    if: ${{ github.event.inputs.backend_only != 'true' }}
    runs-on: ubuntu-latest
    name: 前端测试

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: 安装依赖
      run: |
        cd frontend
        npm ci

    - name: 运行代码质量检查
      run: |
        cd frontend
        echo "🔍 运行前端代码质量检查..."

        # ESLint检查
        npm run lint -- --format=json --output-file=eslint-report.json || true
        npm run lint

        # Prettier格式检查
        npm run format:check || true

        # TypeScript类型检查
        npm run type-check

    - name: 运行单元测试
      run: |
        cd frontend
        echo "🧪 运行前端单元测试..."

        # 使用优化的Jest配置
        npm run test:ci

    - name: 运行组件测试
      run: |
        cd frontend
        echo "🧩 运行组件测试..."

        npm run test -- \
          --config jest.ultra.config.js \
          --testPathPattern="components" \
          --coverage --coverageReporters="json" --coverageReporters="html" \
          --passWithNoTests || true

    - name: 运行集成测试
      if: github.event_name == 'schedule' || github.event.inputs.generate_report == 'true'
      run: |
        cd frontend
        echo "🔗 运行集成测试..."

        npm run test -- \
          --config jest.ultra.config.js \
          --testPathPattern="integration" \
          --coverage --coverageReporters="json" --coverageReporters="html" \
          --passWithNoTests || true

    - name: 构建应用
      run: |
        cd frontend
        echo "🏗️ 构建应用..."

        npm run build

    - name: 运行端到端测试
      if: github.event.inputs.generate_report == 'true'
      run: |
        cd frontend
        echo "🌐 运行端到端测试..."

        # 构建应用
        npm run build

        # 启动应用并运行E2E测试（如果有的话）
        npm run test:e2e || echo "E2E tests skipped"

    - name: 分析包大小
      run: |
        cd frontend
        echo "📦 分析包大小..."

        # 分析包大小
        npx bundlesize || echo "Bundle size analysis skipped"

        # 生成包分析报告
        npx webpack-bundle-analyzer dist/static/js/*.js --mode=json --report=bundle-analysis.json || true

    - name: 上传前端测试结果
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-test-results
        path: |
          frontend/coverage/
          frontend/test-results.json
          frontend/junit.xml
          frontend/eslint-report.json
          frontend/bundle-analysis.json
          frontend/dist/
        retention-days: 30

    - name: 上传覆盖率到Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false

  # 集成测试作业
  integration-tests:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    name: 集成测试

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_land_property
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: 启动后端服务
      run: |
        cd backend
        pip install uv
        uv sync --all-extras

        # 设置环境变量
        cat << EOF > .env
        DATABASE_URL=postgresql://postgres:test_password@localhost:5432/test_land_property
        REDIS_URL=redis://localhost:6379/0
        ENVIRONMENT=testing
        SECRET_KEY=test_integration_secret
        CORS_ORIGINS=["http://localhost:3000", "http://localhost:5173"]
        DEV_MODE=true
        EOF

        # 数据库迁移
        uv run alembic upgrade head

        # 启动后端服务（后台运行）
        uv run python run_dev.py &
        sleep 10

        # 健康检查
        curl -f http://localhost:8002/api/v1/monitoring/health || exit 1

    - name: 启动前端服务
      run: |
        cd frontend
        npm ci
        npm run build

        # 启动前端服务（后台运行）
        npm run preview &
        sleep 10

        # 健康检查
        curl -f http://localhost:4173 || exit 1

    - name: 运行集成测试
      run: |
        echo "🔗 运行集成测试..."

        # 创建集成测试
        mkdir -p integration-tests
        cd integration-tests

        # Python集成测试
        cat << EOF > test_api_integration.py
import pytest
import requests
import time

API_BASE = "http://localhost:8002/api"

class TestAPIIntegration:
    def test_health_check(self):
        response = requests.get(f"{API_BASE}/health")
        assert response.status_code == 200

    def test_assets_api(self):
        response = requests.get(f"{API_BASE}/assets/", timeout=30)
        assert response.status_code == 200

    def test_coverage_api(self):
        response = requests.get(f"{API_BASE}/test-coverage/health", timeout=30)
        assert response.status_code in [200, 404]
EOF

        # 安装依赖并运行测试
        pip install requests pytest
        pytest test_api_integration.py -v --junit-xml=integration-results.xml

    - name: 运行性能基准测试
      run: |
        echo "⚡ 运行性能基准测试..."

        # 使用Apache Bench进行简单的性能测试
        ab -n 100 -c 10 http://localhost:8002/api/v1/monitoring/health > ab-results.txt 2>&1 || true

        # 使用curl测试响应时间
        echo "测量API响应时间..."
        for i in {1..10}; do
          response_time=$(curl -o /dev/null -s -w "%{time_total}" http://localhost:8002/api/v1/monitoring/health)
          echo "请求 $i: ${response_time}s"
        done

    - name: 上传集成测试结果
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: |
          integration-tests/integration-results.xml
          integration-tests/ab-results.txt
        retention-days: 30

  # 覆盖率汇总和质量门禁
  coverage-summary:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    name: 覆盖率汇总与质量门禁

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 下载后端测试结果
      uses: actions/download-artifact@v4
      with:
        name: backend-test-results-3.12
        path: results/backend/

    - name: 下载前端测试结果
      uses: actions/download-artifact@v4
      with:
        name: frontend-test-results
        path: results/frontend/

    - name: 计算总体覆盖率
      run: |
        python3 .github/scripts/calculate_coverage.py

        # 检查覆盖率阈值
        python3 .github/scripts/check_coverage_thresholds.py \
          --backend-threshold ${{ env.BACKEND_COVERAGE_THRESHOLD }} \
          --frontend-threshold ${{ env.FRONTEND_COVERAGE_THRESHOLD }} \
          --total-threshold ${{ env.TOTAL_COVERAGE_THRESHOLD }}

    - name: 生成测试覆盖率报告
      run: |
        python3 .github/scripts/generate_coverage_report.py

    - name: 上传覆盖率报告
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          coverage-summary.json
          coverage-report.html
          quality-gate-result.json
        retention-days: 90

    - name: 发送覆盖率报告到PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const coverageData = JSON.parse(fs.readFileSync('coverage-summary.json', 'utf8'));
            const qualityGate = JSON.parse(fs.readFileSync('quality-gate-result.json', 'utf8'));

            const comment = `## 📊 UltraThink 测试覆盖率报告

            ### 覆盖率概览
            - 🟢 **总体覆盖率**: ${coverageData.overall_coverage.toFixed(1)}%
            - 🔵 **后端覆盖率**: ${coverageData.backend_coverage.toFixed(1)}%
            - 🟡 **前端覆盖率**: ${coverageData.frontend_coverage.toFixed(1)}%

            ### 质量门禁
            ${qualityGate.passed ? '✅ 通过' : '❌ 失败'}

            ${!qualityGate.passed ? '### 未达标项:\n' + qualityGate.failed_checks.map(check => `- ${check}`).join('\n') : ''}

            ### 详细统计
            - 总模块数: ${coverageData.total_modules}
            - 达标模块数: ${coverageData.modules_above_threshold}
            - 总测试数: ${coverageData.total_tests}
            - 通过率: ${(coverageData.passed_tests / coverageData.total_tests * 100).toFixed(1)}%

            ### 改进建议
            ${qualityGate.recommendations ? qualityGate.recommendations.map(rec => `- ${rec}`).join('\n') : '暂无改进建议'}

            ---
            *由 UltraThink 测试自动化系统生成*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('无法生成覆盖率报告评论:', error);
          }

  # 发送通知
  notification:
    needs: [coverage-summary, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    name: 发送通知

    steps:
    - name: 下载覆盖率报告
      uses: actions/download-artifact@v4
      with:
        name: coverage-report
        path: reports/

    - name: 发送Slack通知
      if: ${{ secrets.SLACK_WEBHOOK }}
      run: |
        # 安装jq用于JSON处理
        sudo apt-get install -y jq

        # 读取覆盖率数据
        coverage=$(cat reports/coverage-summary.json)
        backend_coverage=$(echo $coverage | jq -r '.backend_coverage')
        frontend_coverage=$(echo $coverage | jq -r '.frontend_coverage')
        overall_coverage=$(echo $coverage | jq -r '.overall_coverage')

        # 确定消息颜色
        if (( $(echo "$overall_coverage >= $TOTAL_COVERAGE_THRESHOLD" | bc -l) )); then
          color="good"
          emoji="✅"
        else
          color="danger"
          emoji="❌"
        fi

        # 发送Slack消息
        curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text": "'"${emoji} UltraThink 测试覆盖率报告 - ${{ github.repository }}'",
            "attachments": [{
              "color": "'"$color"'",
              "fields": [
                {
                  "title": "总体覆盖率",
                  "value": "'"$overall_coverage"'%",
                  "short": true
                },
                {
                  "title": "后端覆盖率",
                  "value": "'"$backend_coverage"'%",
                  "short": true
                },
                {
                  "title": "前端覆盖率",
                  "value": "'"$frontend_coverage"'%",
                  "short": true
                },
                {
                  "title": "提交",
                  "value": "'"$GITHUB_SHA"'",
                  "short": true
                },
                {
                  "title": "分支",
                  "value": "'"$GITHUB_REF"'",
                  "short": true
                },
                {
                  "title": "详情",
                  "value": "<'"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"'|查看详细报告>",
                  "short": false
                }
              ]
            }]
          }' \
          ${{ secrets.SLACK_WEBHOOK }} || echo "Slack通知失败"