name: API Consistency Check

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, "feature/*", "hotfix/*"]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  api-consistency:
    name: API Consistency
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Install dependencies
      run: |
        # Backend dependencies
        cd backend
        pip install uv
        uv sync --all-extras

        # Frontend dependencies
        cd ../frontend
        pnpm install --frozen-lockfile

    - name: Run Backend API Consistency Check
      run: |
        cd backend
        uv run python scripts/maintenance/api_consistency_check.py . ../frontend
      continue-on-error: true

    - name: Run Frontend API Consistency Check
      run: |
        cd frontend
        node scripts/check-api-consistency.js
      continue-on-error: true

    - name: Upload reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-consistency-reports
        path: |
          backend/api_consistency_report.json
          frontend/frontend-api-consistency-report.json
        retention-days: 30
        if-no-files-found: ignore

    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          try {
            const backendReport = JSON.parse(fs.readFileSync('backend/api_consistency_report.json', 'utf8'));
            const frontendReport = JSON.parse(fs.readFileSync('frontend/frontend-api-consistency-report.json', 'utf8'));

            const totalIssues = backendReport.total_issues + frontendReport.total_issues;
            const criticalIssues = [
              ...backendReport.issues.filter(i => i.severity === 'critical'),
              ...frontendReport.issues.filter(i => i.severity === 'critical')
            ];

            let comment = `## 🔍 API一致性检查结果\n\n`;
            comment += `📊 **总问题数**: ${totalIssues}\n`;
            comment += `🚨 **严重问题**: ${criticalIssues.length}\n`;
            comment += `⚠️ **警告**: ${backendReport.issues.filter(i => i.severity === 'warning').length + frontendReport.issues.filter(i => i.severity === 'warning').length}\n`;
            comment += `ℹ️ **信息**: ${backendReport.issues.filter(i => i.severity === 'info').length + frontendReport.issues.filter(i => i.severity === 'info').length}\n\n`;

            if (criticalIssues.length > 0) {
              comment += `## 🚨 严重问题\n\n`;
              criticalIssues.slice(0, 5).forEach(issue => {
                comment += `- **${issue.type}**: ${issue.message}\n`;
              });

              if (criticalIssues.length > 5) {
                comment += `- ... 还有 ${criticalIssues.length - 5} 个严重问题\n`;
              }
            }

            if (totalIssues === 0) {
              comment += `✅ 所有API一致性检查通过！\n\n`;
              comment += `🎉 恭喜！代码质量很高，API接口完全一致。`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('无法读取报告文件:', error.message);
          }

    - name: Fail on critical issues
      run: |
        python3 << 'EOF'
        import json
        import sys
        try:
            with open('backend/api_consistency_report.json', 'r') as f:
                backend_report = json.load(f)
            with open('frontend/frontend-api-consistency-report.json', 'r') as f:
                frontend_report = json.load(f)

            critical_issues = [
                *[i for i in backend_report.get('issues', []) if i.get('severity') == 'critical'],
                *[i for i in frontend_report.get('issues', []) if i.get('severity') == 'critical']
            ]

            if critical_issues:
                print(f'发现 {len(critical_issues)} 个严重问题，检查失败')
                sys.exit(1)
            else:
                print('没有严重问题，检查通过')
        except FileNotFoundError as e:
            print(f'报告文件不存在: {e}')
            sys.exit(0)
        except Exception as e:
            print(f'检查报告时出错: {e}')
            sys.exit(0)
        EOF
