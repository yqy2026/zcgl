  import-e2e:
    name: Import E2E Regression
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [backend-test, frontend-test, make-quality-gate]
    env:
      ENVIRONMENT: testing
      TESTING_MODE: "true"
      SECRET_KEY: ZcglCiJwtMaterial20260321OnlyForGithub0001
      PHASE4_TENANT_NOT_NULL_DECISION: "B"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_import_e2e_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_import_e2e_test
      E2E_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_import_e2e_test
      E2E_ADMIN_USERNAME: admin
      E2E_ADMIN_PASSWORD: Admin123!@#
      BASE_URL: http://127.0.0.1:5173
      VITE_API_BASE_URL: http://127.0.0.1:8002/api/v1
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zcgl_import_e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zcgl_import_e2e_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Cache uv dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Get pnpm store directory
      id: pnpm-cache-import-e2e
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache-import-e2e.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1 postgresql-client

    - name: Install backend dependencies
      run: |
        cd backend
        pip install uv --upgrade
        uv sync --all-extras

    - name: Install frontend dependencies
      run: |
        cd frontend
        pnpm install --frozen-lockfile

    - name: Install Playwright browser
      run: |
        cd frontend
        pnpm exec playwright install --with-deps chromium

    - name: Initialize database schema
      run: |
        cd backend
        uv run alembic upgrade head

    - name: Seed admin user for import E2E
      run: |
        cd backend
        uv run python - <<'PY'
        import asyncio
        import os
        from sqlalchemy import select
        from src.database import async_session_scope
        from src.models.auth import User
        from src.models.organization import Organization
        from src.models.rbac import Permission, Role, UserRoleAssignment, role_permissions
        from src.services.core.password_service import PasswordService

        ADMIN_USERNAME = os.getenv("E2E_ADMIN_USERNAME", "admin")
        ADMIN_PASSWORD = os.getenv("E2E_ADMIN_PASSWORD", "Admin123!@#")
        ORG_CODE = "E2E-ORG-ROOT"

        async def ensure_organization(db):
            result = await db.execute(select(Organization).where(Organization.code == ORG_CODE))
            organization = result.scalars().first()
            if organization is None:
                organization = Organization(
                    name="E2E Test Organization",
                    code=ORG_CODE,
                    level=1,
                    sort_order=0,
                    type="总部",
                    status="active",
                    path=f"/{ORG_CODE}",
                    is_deleted=False,
                    created_by="ci-import-e2e",
                    updated_by="ci-import-e2e",
                )
                db.add(organization)
                await db.commit()
                await db.refresh(organization)
            return organization

        async def ensure_admin_role(db):
            result = await db.execute(select(Role).where(Role.name == "admin"))
            role = result.scalars().first()
            if role is None:
                role = Role(
                    name="admin",
                    display_name="管理员",
                    is_system_role=True,
                    is_active=True,
                    created_by="ci-import-e2e",
                    updated_by="ci-import-e2e",
                )
                db.add(role)
                await db.commit()
                await db.refresh(role)
            return role

        async def ensure_admin_permission(db):
            result = await db.execute(
                select(Permission).where(
                    Permission.resource == "system",
                    Permission.action == "admin",
                )
            )
            permission = result.scalars().first()
            if permission is None:
                permission = Permission(
                    name="system:admin",
                    display_name="系统管理员",
                    description="系统管理员权限",
                    resource="system",
                    action="admin",
                    is_system_permission=True,
                    requires_approval=False,
                    created_by="ci-import-e2e",
                    updated_by="ci-import-e2e",
                )
                db.add(permission)
                await db.commit()
                await db.refresh(permission)
            return permission

        async def ensure_role_permission(db, role_id, permission_id):
            mapping_result = await db.execute(
                select(role_permissions).where(
                    role_permissions.c.role_id == role_id,
                    role_permissions.c.permission_id == permission_id,
                )
            )
            if mapping_result.first() is None:
                await db.execute(
                    role_permissions.insert().values(
                        role_id=role_id,
                        permission_id=permission_id,
                        created_by="ci-import-e2e",
                    )
                )
                await db.commit()

        async def upsert_admin_user(db, organization_id):
            result = await db.execute(select(User).where(User.username == ADMIN_USERNAME))
            user = result.scalars().first()
            password_hash = PasswordService().get_password_hash(ADMIN_PASSWORD)

            if user is None:
                user = User(
                    username=ADMIN_USERNAME,
                    email=f"{ADMIN_USERNAME}@example.com",
                    phone="13800000111",
                    full_name="Import E2E Admin",
                    password_hash=password_hash,
                    is_active=True,
                    is_locked=False,
                    failed_login_attempts=0,
                    default_organization_id=organization_id,
                    created_by="ci-import-e2e",
                    updated_by="ci-import-e2e",
                )
                db.add(user)
                await db.commit()
                await db.refresh(user)
            else:
                user.password_hash = password_hash
                user.is_active = True
                user.is_locked = False
                user.failed_login_attempts = 0
                user.locked_until = None
                user.default_organization_id = organization_id
                user.updated_by = "ci-import-e2e"
                await db.commit()
                await db.refresh(user)
            return user

        async def ensure_user_role_assignment(db, user_id, role_id):
            result = await db.execute(
                select(UserRoleAssignment).where(
                    UserRoleAssignment.user_id == user_id,
                    UserRoleAssignment.role_id == role_id,
                )
            )
            assignment = result.scalars().first()
            if assignment is None:
                assignment = UserRoleAssignment(
                    user_id=user_id,
                    role_id=role_id,
                    assigned_by="ci-import-e2e",
                    is_active=True,
                )
                db.add(assignment)
            else:
                assignment.is_active = True
                assignment.assigned_by = "ci-import-e2e"
            await db.commit()

        async def main():
            async with async_session_scope() as db:
                organization = await ensure_organization(db)
                role = await ensure_admin_role(db)
                permission = await ensure_admin_permission(db)
                await ensure_role_permission(db, role.id, permission.id)
                user = await upsert_admin_user(db, organization.id)
                await ensure_user_role_assignment(db, user.id, role.id)

        asyncio.run(main())
        PY

