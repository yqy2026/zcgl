name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, "feature/*", "hotfix/*"]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  # Updated to match TESTING_STANDARDS.md baseline gates (更新以匹配文档基线)
  BACKEND_COVERAGE_THRESHOLD: 70
  FRONTEND_COVERAGE_THRESHOLD: 50

jobs:
  # ===========================
  # Backend Lint & Type Check
  # ===========================
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        cache-dependency-path: backend/pyproject.toml

    - name: Cache uv dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1

    - name: Install Python dependencies
      run: |
        cd backend
        pip install uv --upgrade
        uv sync --all-extras

    - name: Validate Python syntax
      run: |
        cd backend
        find src/ -name "*.py" -exec uv run python -m py_compile {} \;

    - name: Run Ruff linting
      run: |
        cd backend
        uv run ruff check src/ --output-format=github --exit-non-zero-on-fix

    - name: Run Ruff formatting check
      run: |
        cd backend
        uv run ruff format --check src/

    - name: Run MyPy type checking
      run: |
        cd backend
        uv run mypy src/ --config-file=pyproject.toml

    - name: Security check (Bandit)
      run: |
        cd backend
        uv run bandit -r src/ -f txt
        # REMOVED || true - security issues should now fail CI

  # ===========================
  # Backend Tests
  # ===========================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: backend-lint
    env:
      ENVIRONMENT: testing
      TESTING_MODE: "true"
      SECRET_KEY: ZcglCiJwtMaterial20260321OnlyForGithub0001
      PHASE4_TENANT_NOT_NULL_DECISION: "B"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zcgl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zcgl_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1 postgresql-client

    - name: Install Python dependencies
      run: |
        cd backend
        pip install uv --upgrade
        uv sync --all-extras

    - name: Get baseline coverage
      id: get-baseline
      run: |
        # Try to fetch baseline from previous run or use 0
        BASELINE=$(gh api /repos/${{ github.repository }}/actions/artifacts \
          --jq '.artifacts[] | select(.name == "coverage-baseline") | .created_at' \
          2>/dev/null | head -1 || echo "0")

        if [ "$BASELINE" = "0" ]; then
          # No previous baseline found, use current coverage as starting point
          echo "coverage=0" >> $GITHUB_OUTPUT
        else
          # Would need to download artifact to get actual baseline
          # For now, use incremental mode starting from 0
          echo "coverage=0" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true

    - name: Initialize test database
      run: |
        cd backend
        uv run alembic upgrade head
        echo "Database initialized with migrations"

    - name: Run unit tests
      run: |
        cd backend
        uv run pytest tests/unit/ \
          --cov=src \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing \
          --junit-xml=test-results.xml \
          -v \
          --tb=short

    - name: Check coverage (incremental mode)
      run: |
        cd backend
        python ../.github/scripts/incremental_coverage_check.py \
          coverage.xml \
          ${{ steps.get-baseline.outputs.coverage }} \
          --target=${{ env.BACKEND_COVERAGE_THRESHOLD }} \
          --soft-threshold=70 \
          --increment=1

    - name: Upload backend reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: backend-reports
        path: |
          backend/coverage.xml
          backend/htmlcov/
          backend/test-results.xml
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false  # Don't let Codecov failures block us

  # ===========================
  # Backend E2E Tests (BLOCKING)
  # ===========================
  backend-e2e:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: backend-test
    env:
      ENVIRONMENT: testing
      TESTING_MODE: "true"
      SECRET_KEY: ZcglCiJwtMaterial20260321OnlyForGithub0001
      PHASE4_TENANT_NOT_NULL_DECISION: "B"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_e2e_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_e2e_test
      E2E_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_e2e_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zcgl_e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zcgl_e2e_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache uv dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1 postgresql-client

    - name: Install Python dependencies
      run: |
        cd backend
        pip install uv --upgrade
        uv sync --all-extras

    - name: Initialize test database
      run: |
        cd backend
        uv run alembic upgrade head

    - name: Run backend E2E tests
      run: |
        cd backend
        mkdir -p ../test-results/backend/junit
        uv run pytest tests/e2e/ -m e2e --no-cov -v --junitxml=../test-results/backend/junit/junit-e2e.xml

    - name: Upload backend E2E reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: backend-e2e-reports
        path: |
          test-results/backend/junit/junit-e2e.xml
        retention-days: 30

  # ===========================
  # Frontend Lint & Type Check
  # ===========================
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: |
        cd frontend
        pnpm install --frozen-lockfile

    - name: Run Oxlint
      run: |
        cd frontend
        pnpm lint

    - name: Export frontend lint/guard reports (blocking)
      run: |
        cd frontend
        mkdir -p ../reports/frontend
        pnpm exec oxlint --config .oxlintrc.json --disable-unicorn-plugin --react-plugin --import-plugin --jsx-a11y-plugin -f json src > ../reports/frontend/oxlint-report.json
        pnpm guard:ui:ci

    - name: Run Oxfmt check
      run: |
        cd frontend
        pnpm format:check

    - name: Run TypeScript check (Tsgo)
      run: |
        cd frontend
        pnpm type-check

    - name: Run E2E TypeScript check (Tsgo)
      run: |
        cd frontend
        pnpm type-check:e2e

    - name: Run route authz mutual-exclusion gate (D10)
      run: |
        cd frontend
        pnpm check:route-authz

    - name: Run type coverage check
      run: |
        cd frontend
        pnpm type-coverage:check || true  # Non-blocking for now

    - name: Upload frontend lint reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: frontend-lint-reports
        path: |
          reports/frontend/oxlint-report.json
          reports/frontend/style-px-report.json
          reports/frontend/token-sync-report.json
        retention-days: 30

  # ===========================
  # Frontend Tests
  # ===========================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: frontend-lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: |
        cd frontend
        pnpm install --frozen-lockfile

    - name: Run tests with coverage
      run: |
        cd frontend
        pnpm test:ci

    - name: Check coverage threshold
      run: |
        cd frontend
        SUMMARY_FILE=../test-results/frontend/coverage/coverage-summary.json

        # Extract coverage from JSON summary
        COVERAGE=$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(data.total.lines.pct)" "$SUMMARY_FILE")

        echo "Current coverage: ${COVERAGE}%"
        echo "Target: ${{ env.FRONTEND_COVERAGE_THRESHOLD }}%"

        # Use Python script for incremental checking
        python ../.github/scripts/incremental_coverage_check.py \
          "$SUMMARY_FILE" \
          0 \
          --target=${{ env.FRONTEND_COVERAGE_THRESHOLD }} \
          --soft-threshold=50 \
          --increment=1 || true  # Non-blocking until we reach baseline

    - name: Upload frontend reports
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: frontend-reports
        path: |
          test-results/frontend/coverage/
          test-results/frontend/reports/
        retention-days: 30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./test-results/frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false

    - name: Build frontend
      run: |
        cd frontend
        npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 7

  # ===========================
  # Make Gate (ruff + tsgo + test)
  # ===========================
  make-quality-gate:
    name: Make CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [backend-lint, frontend-lint]
    env:
      ENVIRONMENT: testing
      TESTING_MODE: "true"
      SECRET_KEY: ZcglCiJwtMaterial20260321OnlyForGithub0001
      PHASE4_TENANT_NOT_NULL_DECISION: "B"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zcgl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zcgl_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Cache uv dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Get pnpm store directory
      id: pnpm-cache-make
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache-make.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1 postgresql-client

    - name: Install backend dependencies
      run: |
        cd backend
        pip install uv --upgrade
        uv sync --all-extras

    - name: Install frontend dependencies
      run: |
        cd frontend
        pnpm install --frozen-lockfile

    - name: Initialize test database
      run: |
        cd backend
        uv run alembic upgrade head

    - name: Run Make CI gate
      run: make ci-gate

  # ===========================
  # Frontend E2E Tests (BLOCKING)
  # ===========================
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [backend-test, frontend-test, make-quality-gate]
    env:
      ENVIRONMENT: testing
      TESTING_MODE: "true"
      SECRET_KEY: ZcglCiJwtMaterial20260321OnlyForGithub0001
      PHASE4_TENANT_NOT_NULL_DECISION: "B"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_e2e_test
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/zcgl_e2e_test
      E2E_ADMIN_USERNAME: admin
      E2E_ADMIN_PASSWORD: Admin123!@#
      E2E_LOGOUT_USERNAME: e2e_logout_admin
      E2E_LOGOUT_PASSWORD: Logout123!@#
      E2E_REQUIRE_AUTH_STATE: "true"
      BASE_URL: http://127.0.0.1:5173
      VITE_API_BASE_URL: http://127.0.0.1:8002/api/v1
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zcgl_e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zcgl_e2e_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Cache uv dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          ~/.local/share/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Get pnpm store directory
      id: pnpm-cache-e2e
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache-e2e.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install backend dependencies
      run: |
        cd backend
        pip install uv --upgrade
        uv sync --all-extras

    - name: Install frontend dependencies
      run: |
        cd frontend
        pnpm install --frozen-lockfile

    - name: Install Playwright browser
      run: |
        cd frontend
        pnpm exec playwright install --with-deps chromium firefox webkit

    - name: Initialize database schema
      run: |
        cd backend
        uv run alembic upgrade head

    - name: Seed admin user for E2E
      run: |
        cd backend
        uv run python - <<'PY'
        import asyncio
        import os
        from sqlalchemy import select
        from src.database import async_session_scope
        from src.models.auth import User
        from src.models.organization import Organization
        from src.models.rbac import Permission, Role, UserRoleAssignment, role_permissions
        from src.services.core.password_service import PasswordService

        ADMIN_USERNAME = os.getenv("E2E_ADMIN_USERNAME", "admin")
        ADMIN_PASSWORD = os.getenv("E2E_ADMIN_PASSWORD", "Admin123!@#")
        LOGOUT_USERNAME = os.getenv("E2E_LOGOUT_USERNAME", "e2e_logout_admin")
        LOGOUT_PASSWORD = os.getenv("E2E_LOGOUT_PASSWORD", "Logout123!@#")
        ORG_CODE = "E2E-ORG-ROOT"

        async def ensure_organization(db):
            result = await db.execute(
                select(Organization).where(Organization.code == ORG_CODE)
            )
            organization = result.scalars().first()
            if organization is None:
                organization = Organization(
                    name="E2E Test Organization",
                    code=ORG_CODE,
                    level=1,
                    sort_order=0,
                    type="总部",
                    status="active",
                    path=f"/{ORG_CODE}",
                    is_deleted=False,
                    created_by="ci-e2e",
                    updated_by="ci-e2e",
                )
                db.add(organization)
                await db.commit()
                await db.refresh(organization)
            return organization

        async def ensure_admin_role(db):
            role_result = await db.execute(select(Role).where(Role.name == "admin"))
            role = role_result.scalars().first()
            if role is None:
                role = Role(
                    name="admin",
                    display_name="管理员",
                    is_system_role=True,
                    is_active=True,
                    created_by="ci-e2e",
                    updated_by="ci-e2e",
                )
                db.add(role)
                await db.commit()
                await db.refresh(role)
            return role

        async def ensure_regular_role(db):
            role_result = await db.execute(select(Role).where(Role.name == "user"))
            role = role_result.scalars().first()
            if role is None:
                role = Role(
                    name="user",
                    display_name="普通用户",
                    description="Frontend E2E regular role",
                    is_system_role=True,
                    is_active=True,
                    scope="global",
                    created_by="ci-e2e",
                    updated_by="ci-e2e",
                )
                db.add(role)
                await db.commit()
                await db.refresh(role)
            return role

        async def ensure_admin_permission(db):
            permission_result = await db.execute(
                select(Permission).where(
                    Permission.resource == "system",
                    Permission.action == "admin",
                )
            )
            permission = permission_result.scalars().first()
            if permission is None:
                permission = Permission(
                    name="system:admin",
                    display_name="系统管理员",
                    description="系统管理员权限",
                    resource="system",
                    action="admin",
                    is_system_permission=True,
                    requires_approval=False,
                    created_by="ci-e2e",
                    updated_by="ci-e2e",
                )
                db.add(permission)
                await db.commit()
                await db.refresh(permission)
            return permission

        async def ensure_role_permission(db, role_id, permission_id):
            mapping_result = await db.execute(
                select(role_permissions).where(
                    role_permissions.c.role_id == role_id,
                    role_permissions.c.permission_id == permission_id,
                )
            )
            mapping = mapping_result.first()
            if mapping is None:
                await db.execute(
                    role_permissions.insert().values(
                        role_id=role_id,
                        permission_id=permission_id,
                        created_by="ci-e2e",
                    )
                )
                await db.commit()

        async def upsert_admin_user(db, *, username, password, full_name, email, phone, organization_id):
            user_result = await db.execute(select(User).where(User.username == username))
            user = user_result.scalars().first()
            password_service = PasswordService()
            password_hash = password_service.get_password_hash(password)

            if user is None:
                user = User(
                    username=username,
                    email=email,
                    phone=phone,
                    full_name=full_name,
                    password_hash=password_hash,
                    is_active=True,
                    is_locked=False,
                    failed_login_attempts=0,
                    default_organization_id=organization_id,
                    created_by="ci-e2e",
                    updated_by="ci-e2e",
                )
                db.add(user)
                await db.commit()
                await db.refresh(user)
            else:
                user.email = email
                user.phone = phone
                user.full_name = full_name
                user.password_hash = password_hash
                user.is_active = True
                user.is_locked = False
                user.failed_login_attempts = 0
                user.locked_until = None
                user.default_organization_id = organization_id
                user.updated_by = "ci-e2e"
                await db.commit()
                await db.refresh(user)
            return user

        async def ensure_user_role_assignment(db, user_id, role_id):
            assignment_result = await db.execute(
                select(UserRoleAssignment).where(
                    UserRoleAssignment.user_id == user_id,
                    UserRoleAssignment.role_id == role_id,
                )
            )
            assignment = assignment_result.scalars().first()
            if assignment is None:
                assignment = UserRoleAssignment(
                    user_id=user_id,
                    role_id=role_id,
                    assigned_by="ci-e2e",
                    is_active=True,
                )
                db.add(assignment)
            else:
                assignment.is_active = True
                assignment.assigned_by = "ci-e2e"
            await db.commit()

        async def main():
            async with async_session_scope() as db:
                organization = await ensure_organization(db)
                admin_role = await ensure_admin_role(db)
                await ensure_regular_role(db)
                admin_permission = await ensure_admin_permission(db)
                await ensure_role_permission(db, admin_role.id, admin_permission.id)

                admin_user = await upsert_admin_user(
                    db,
                    username=ADMIN_USERNAME,
                    password=ADMIN_PASSWORD,
                    full_name="E2E Admin User",
                    email=f"{ADMIN_USERNAME}@example.com",
                    phone="13800000000",
                    organization_id=organization.id,
                )
                logout_user = await upsert_admin_user(
                    db,
                    username=LOGOUT_USERNAME,
                    password=LOGOUT_PASSWORD,
                    full_name="E2E Logout Admin",
                    email=f"{LOGOUT_USERNAME}@example.com",
                    phone="13800000009",
                    organization_id=organization.id,
                )

                await ensure_user_role_assignment(db, admin_user.id, admin_role.id)
                await ensure_user_role_assignment(db, logout_user.id, admin_role.id)

        asyncio.run(main())
        PY

    - name: Start backend server
      run: |
        cd backend
        mkdir -p ../test-results/backend
        nohup uv run uvicorn src.main:app --host 127.0.0.1 --port 8002 > ../test-results/backend/e2e-backend.log 2>&1 &
        echo $! > ../test-results/backend/e2e-backend.pid

    - name: Wait for backend readiness
      run: |
        python - <<'PY'
        import time
        import urllib.error
        import urllib.request
        url = "http://127.0.0.1:8002/docs"
        for _ in range(60):
            try:
                request = urllib.request.Request(url, method="GET")
                with urllib.request.urlopen(request, timeout=2) as response:
                    if response.status in (200, 301, 302):
                        print("Backend is ready.")
                        break
            except urllib.error.HTTPError as error:
                if error.code in (401, 403, 404, 405):
                    print("Backend is ready.")
                    break
            except Exception:
                pass
            time.sleep(2)
        else:
            raise SystemExit("Backend did not become ready in time.")
        PY

