name: Documentation

"on":
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'backend/docs/**'
      - 'backend/mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'backend/docs/**'
      - 'backend/mkdocs.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1

    - name: Install Python dependencies
      run: |
        cd backend
        pip install uv
        uv sync --all-extras

    - name: Install MkDocs dependencies
      run: |
        cd backend
        uv run pip install mkdocs-material mkdocs-git-revision-date-localized-plugin \
          mkdocs-macros-plugin mkdocs-minify-plugin pymdown-extensions

    - name: Build documentation
      run: |
        cd backend
        uv run mkdocs build --strict

    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v4
      with:
        name: documentation-site
        path: backend/site/
        retention-days: 30

    - name: Check for broken links
      run: |
        cd backend
        uv run pip install linkchecker
        linkchecker site/ || true

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download documentation
      uses: actions/download-artifact@v4
      with:
        name: documentation-site
        path: backend/site/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./backend/site
        keep_files: false
