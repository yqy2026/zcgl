# CI/CD Global Configuration - Single Source of Truth
# CI/CD 全局配置 - 单一配置源
#
# This file serves as the central configuration for all CI/CD workflows.
# 此文件作为所有CI/CD工作流的中央配置。
#
# Version: 1.0.0
# Last Updated: 2026-01-15

version: 1.0

# Coverage targets matching TESTING_STANDARDS.md documentation
# 覆盖率目标，匹配TESTING_STANDARDS.md文档
coverage:
  backend:
    target: 85  # Overall backend coverage target (后端总体覆盖率目标)
    soft_threshold: 80  # Below this: incremental mode active (低于此值启用增量模式)
    increment: 1  # Required % improvement per PR when below threshold (阈值以下每次PR需提升的百分比)

  frontend:
    target: 75  # Overall frontend coverage target (前端总体覆盖率目标)
    soft_threshold: 70  # Below this: incremental mode active
    increment: 1

# Quality gate thresholds (zero tolerance for new issues)
# 质量门槛阈值（对新问题零容忍）
quality_gates:
  max_errors: 0  # Maximum errors allowed (允许的最大错误数)
  max_warnings: 0  # Maximum warnings allowed (ESLint --max-warnings=0)
  max_security_issues: 0  # Maximum security issues allowed
  max_complexity_score: 10  # Maximum cyclomatic complexity (圈复杂度上限)
  max_duplication_percentage: 5  # Maximum code duplication (代码重复度上限)

# Tool versions - lock for consistent CI behavior
# 工具版本 - 锁定以确保CI行为一致
tools:
  python: '3.12'
  node: '20'
  uv: '0.4.x'  # UV package manager
  ruff: '0.6.8'  # Python linter
  mypy: '1.11.2'  # Python type checker
  bandit: '1.7.9'  # Python security linter
  pytest: '8.0.0'  # Python test framework

# Workflow configuration
# 工作流配置
workflows:
  parallel_jobs: 4  # Maximum parallel job execution (最大并行作业数)
  timeout_minutes: 30  # Default job timeout (默认作业超时)
  cache_version: 'v1'  # Cache busting key (缓存破坏键)

# Integration tests configuration
# 集成测试配置
integration:
  enabled: true
  run_on: 'push'  # Options: 'push', 'pull_request', 'manual'
  services:
    postgres:
      version: '15'
      redis:
        version: '7'

# Exception handling
# 例外处理
exceptions:
  enabled: true
  config_file: '.github/config/coverage_exceptions.yml'
