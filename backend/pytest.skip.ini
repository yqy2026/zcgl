[pytest]
# Pytest 配置文件 - 用于临时跳过已知问题的测试

# 测试标记
markers =
    skip_fix: 临时跳过待修复的测试
    enum_issue: 枚举验证相关问题
    business_logic: 业务规则变更
    exception_handling: 异常处理逻辑变更

# 测试路径
testpaths = tests

# Python 路径
pythonpath = .

# 最小 Python 版本
minversion = 3.12

# 日志配置
log_cli = true
log_cli_level = INFO

# 自动发现
python_files = test_*.py
python_classes = Test*
python_functions = test_

# 超时设置
timeout = 300
timeout_method = thread

# 覆盖率配置
addopts =
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --strict-markers
    --tb=short
    -v

# Coverage 配置
[coverage:report]
fail_under = 70

[pytestmenupathor_plugin]
menupathor = docs/

# Warning 过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
