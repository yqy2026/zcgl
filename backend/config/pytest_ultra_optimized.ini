[pytest]
# UltraThink优化pytest配置文件
# 确保测试覆盖率监控自动化和最佳实践

# 基础配置
minversion = 7.0
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --showlocals
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=85  # Match TESTING_STANDARDS.md (匹配文档标准)
    --durations=10
    --maxfail=5
    --disable-warnings

# 测试发现模式
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    # 优先级标记
    P0: 最高优先级 - 关键安全和业务逻辑
    P1: 高优先级 - 核心功能模块
    P2: 中优先级 - 一般功能模块
    P3: 低优先级 - 边缘功能

    # 测试类型标记
    unit: 单元测试 - 测试单个函数/类
    integration: 集成测试 - 测试模块间交互
    e2e: 端到端测试 - 完整业务流程
    performance: 性能测试 - 响应时间和资源使用
    security: 安全测试 - 权限验证和数据保护

    # 功能模块标记
    rbac: RBAC权限系统测试
    asset: 资产管理测试
    pdf: PDF处理测试
    excel: Excel导入导出测试
    api: API端点测试
    calculator: 计算逻辑测试

    # 状态标记
    slow: 慢速测试 - 执行时间较长
    flaky: 不稳定测试 - 可能间歇性失败
    skip: 跳过测试 - 临时禁用
    skip_ci: CI环境跳过

    # 数据库标记
    database: 需要数据库连接
    sqlite: 使用SQLite数据库
    postgresql: 使用PostgreSQL数据库

    # 外部依赖标记
    external_api: 调用外部API
    file_system: 操作文件系统
    network: 需要网络连接

# 过滤器配置
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pdfplumber.*
    ignore::UserWarning:PyMuPDF.*
    error::FutureWarning

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 并行配置
# 注意：需要安装 pytest-xdist
# addopts = -n auto

# 测试覆盖率配置
[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*
    */conftest.py
    */factory.py
    */factories.py

branch = True
parallel = true

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
title = 地产资产管理系统 - 测试覆盖率报告

[coverage:xml]
output = coverage.xml

# 性能测试配置
[pytest-performance]
benchmark_min_rounds = 3
benchmark_timer = time.perf_counter
benchmark_sort = stddev

# 缓存配置
[pytest-cache]
cache_dir = .pytest_cache

# 并发测试配置（如果使用pytest-xdist）
[pytest-xdist]
processes = auto
dist = loadfile

# JUnit XML报告配置
junit_family = xunit2
junit_logging = all