# 开发环境配置文件
# 注意: 生产环境应使用环境变量而非此文件
app:
  name: "Land Property Asset Management System"
  version: "2.0.0"
  debug: false # 生产环境必须为false

database:
  # 使用环境变量 DATABASE_URL 覆盖此配置
  url: "postgresql://USERNAME:PASSWORD@localhost:5432/zcgl"

security:
  # ⚠️ 安全警告: 禁止在生产环境使用此密钥！
  # 请使用环境变量 SECRET_KEY 设置强密钥
  # 生成方法: python -c "import secrets; print(secrets.token_urlsafe(32))"
  secret_key: "REPLACE-WITH-SECURE-SECRET-KEY"
  algorithm: "HS256"
  access_token_expire_minutes: 60

middleware:
  cors:
    # 生产环境应限制具体域名
    allow_origins:
      - "http://localhost:5173"
      - "http://localhost:3000"
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
