[pytest]
# pytest configuration file - Production-grade testing infrastructure

# =============================================================================
# Basic Configuration
# =============================================================================

# Async test mode
asyncio_mode = auto

# Test paths
testpaths = tests

# File matching patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# =============================================================================
# Command Line Options
# =============================================================================

addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --import-mode=importlib
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=json:coverage.json
    --cov-fail-under=75
    --junitxml=junit-report.xml

# Ignored directories
norecursedirs = 
    archive
    *.egg-info
    .git
    .tox
    dist
    build
    node_modules
    __pycache__
    .pytest_cache

# =============================================================================
# Logging Configuration
# =============================================================================

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# =============================================================================
# Test Markers
# =============================================================================

markers =
    unit: Unit tests - single function or class tests
    integration: Integration tests - module collaboration tests
    e2e: End-to-end tests - complete workflow tests
    slow: Slow running tests (execution time > 10s)
    database: Database tests - requires database connection
    api: API tests - REST API endpoint testing
    ocr: OCR tests - OCR functionality tests
    pdf: PDF processing tests
    rbac: RBAC tests - permission functionality tests
    security: Security tests - vulnerability and penetration testing
    performance: Performance tests - load and stress testing
    load: Load tests - high volume and sustained load testing
    stress: Stress tests - maximum capacity and pressure testing
    core: Core functionality tests
    asyncio: Async tests

# =============================================================================
# Timeout Configuration
# =============================================================================

timeout = 300
timeout_method = thread

# =============================================================================
# Minimum pytest version
# =============================================================================

minversion = 7.4

# =============================================================================
# Coverage Configuration
# =============================================================================

[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*
    */archive/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
