[pytest]
# pytest配置文件 - 生产级别测试基础设施

# =============================================================================
# 基本配置
# =============================================================================

# 异步测试模式
asyncio_mode = auto

# 测试路径
testpaths = tests

# 文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# =============================================================================
# 命令行选项
# =============================================================================

addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --import-mode=importlib
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=json:coverage.json
    --cov-fail-under=75
    --junitxml=junit-report.xml

# 忽略的目录
norecursedirs = 
    archive
    *.egg-info
    .git
    .tox
    dist
    build
    node_modules
    __pycache__
    .pytest_cache

# =============================================================================
# 日志配置
# =============================================================================

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# =============================================================================
# 测试标记 (markers)
# =============================================================================

markers =
    unit: Unit tests - single function or class tests
    integration: Integration tests - module collaboration tests
    e2e: End-to-end tests - complete workflow tests
    slow: Slow running tests (execution time > 10s)
    database: Database tests - requires database connection
    api: API tests - REST API endpoint testing
    ocr: OCR tests - OCR functionality tests
    pdf: PDF processing tests
    rbac: RBAC tests - permission functionality tests
    security: Security tests - vulnerability and penetration testing
    performance: Performance tests - load and stress testing
    core: Core functionality tests
    asyncio: Async tests

# =============================================================================
# 超时配置
# =============================================================================

timeout = 300
timeout_method = thread

# =============================================================================
# 最小pytest版本
# =============================================================================

minversion = 7.4

# =============================================================================
# 覆盖率配置
# =============================================================================

[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*
    */archive/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
