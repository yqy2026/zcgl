[pytest]
# Pytest配置文件 - 统一测试配置

# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    unit: 单元测试 - 测试单个函数或类
    integration: 集成测试 - 测试模块间协作
    e2e: 端到端测试 - 测试完整流程
    slow: 慢速测试 - 需要较长时间运行
    database: 数据库测试 - 需要数据库连接
    api: API测试 - 测试API端点
    ocr: OCR测试 - 测试OCR功能
    pdf: PDF处理测试 - 测试PDF处理功能
    rbac: 权限测试 - 测试RBAC功能
    performance: 性能测试 - 性能基准测试
    core: 核心功能测试 - 核心功能验证

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

