[project]
name = "land-property-management"
version = "0.1.0"
description = "土地物业资产管理系统"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "sqlalchemy>=2.0.0",
    "alembic>=1.12.0",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.0.0",
    "polars>=0.20.0",
    "openpyxl>=3.1.0",
    "python-multipart>=0.0.6",
    "email-validator>=2.0.0",
    "pandas>=2.0.0",
    "redis>=5.0.0",
    "aioredis>=2.0.0",
    # PDF处理和NLP依赖
    "markitdown>=0.1.0",
    "pdfplumber==0.11.0",
    "spacy>=3.6.0",
    "jieba>=0.42.1",
    "regex>=2023.0.0",
    "aiofiles>=23.0.0",
    "fuzzywuzzy>=0.18.0",
    "python-Levenshtein>=0.25.1",
    "pytesseract>=0.3.13",
    "pdf2image>=1.17.0",
    "pillow>=11.3.0",
    "opencv-python>=4.12.0.88",
    "paddlepaddle>=3.2.0",
    "paddleocr>=3.2.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "pymupdf==1.24.5",
    "python-magic>=0.4.27",
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.6.22",
    "mkdocs-macros-plugin>=1.4.0",
    "mkdocs-minify-plugin>=0.8.0",
    "mkdocs-git-revision-date-localized-plugin>=1.4.7",
    "pymdown-extensions>=10.16.1",
    "pre-commit>=4.3.0",
    "bandit>=1.8.6",
    "radon>=6.0.1",
    "safety>=3.6.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "httpx>=0.25.0",
    "mypy>=1.7.0",
    "ruff>=0.1.6",
    "pytest-cov>=4.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
target-version = "py312"
line-length = 88
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[dependency-groups]
dev = [
    "aiohttp>=3.13.0",
    "pytest",
]
