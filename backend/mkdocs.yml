site_name: Land Property Management System
site_description: 土地物业资产管理系统 - 完整技术文档
site_author: Development Team
repo_url: https://github.com/your-username/land-property-management
copyright: Copyright &copy; 2025 Development Team

# Configuration
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - header.autohide
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  logo: assets/logo.png

# Plugins
plugins:
  - search:
      lang: zh
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai
  - awesome-pages
  - macros

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
      title: 目录
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: your-username
      repo: land-property-management
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Navigation
nav:
  - 首页: index.md
  - 快速开始:
    - 系统概述: getting-started/overview.md
    - 环境要求: getting-started/requirements.md
    - 安装指南: getting-started/installation.md
    - 快速启动: getting-started/quickstart.md
    - 开发环境: getting-started/development.md
  - 架构设计:
    - 系统架构: architecture/system-architecture.md
    - 技术栈: architecture/tech-stack.md
    - 数据库设计: architecture/database-design.md
    - API设计: architecture/api-design.md
    - 安全架构: architecture/security-architecture.md
  - 开发指南:
    - 代码规范: development/coding-standards.md
    - API开发: development/api-development.md
    - 前端开发: development/frontend-development.md
    - 数据库操作: development/database-operations.md
    - 测试指南: development/testing.md
    - 部署指南: development/deployment.md
  - API文档:
    - 概述: api/overview.md
    - 认证: api/authentication.md
    - 资产管理: api/assets.md
    - 项目管理: api/projects.md
    - 权属管理: api/ownerships.md
    - Excel导入导出: api/excel.md
    - PDF处理: api/pdf-import.md
    - 任务管理: api/tasks.md
    - 统计分析: api/statistics.md
    - 错误处理: api/error-handling.md
  - 数据库:
    - 概述: database/overview.md
    - 表结构: database/tables.md
    - 关系图: database/relationships.md
    - 索引优化: database/indexes.md
    - 查询示例: database/queries.md
    - 迁移指南: database/migrations.md
  - 安全:
    - 安全概述: security/overview.md
    - 认证授权: security/authentication.md
    - 文件安全: security/file-security.md
    - 请求安全: security/request-security.md
    - 审计日志: security/audit-logging.md
    - 安全配置: security/configuration.md
  - 运维:
    - 监控告警: operations/monitoring.md
    - 日志管理: operations/logging.md
    - 性能优化: operations/performance.md
    - 备份恢复: operations/backup.md
    - 故障排除: operations/troubleshooting.md
  - 更新日志:
    - 版本历史: changelog/version-history.md
    - 升级指南: changelog/upgrade-guide.md
    - 已知问题: changelog/known-issues.md
  - 贡献指南:
    - 贡献流程: contributing/contributing.md
    - 代码审查: contributing/code-review.md
    - 提交规范: contributing/commit-convention.md
    - 问题反馈: contributing/issue-reporting.md

# 自定义页面
extra:
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-username/land-property-management
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/your-username/land-property-management
  version:
    provider: mike
    default: stable
    alias: true

# 额外CSS和JS
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# 文档目录
docs_dir: docs
site_dir: site

# 严格模式
strict: true

# 监听文件变化
watch:
  - backend/src
  - frontend/src
  - docs

# 开发服务器
dev_addr: 0.0.0.0:8000