services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: zcgl-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://backend:8002/api/v1
    depends_on:
      - backend
    networks:
      - zcgl-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zcgl-backend
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=sqlite:///./database/data/zcgl.db
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:3000,http://frontend:80
      - API_PORT=8002
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./database/data:/app/database/data
      - ./logs:/app/logs
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/monitoring/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zcgl-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: zcgl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - zcgl-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: zcgl-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./deployment/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - zcgl-network

volumes:
  redis_data:
    driver: local

networks:
  zcgl-network:
    driver: bridge