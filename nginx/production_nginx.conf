# 生产环境 Nginx 配置
# 专为地产资产管理系统优化的高性能、高可用配置

user nginx;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time" '
                       'cache_status=$upstream_cache_status '
                       'request_id=$request_id';

    access_log /var/log/nginx/access.log detailed;

    # 基础配置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # 安全头配置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; form-action 'self';" always;

    # 限制请求
    client_max_body_size 100M;  # 支持大文件上传
    client_body_buffer_size 1M;
    client_header_buffer_size 4k;
    large_client_header_buffers 8 4k;

    # 临时文件配置
    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path /var/cache/nginx/proxy_temp;
    fastcgi_temp_path /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path /var/cache/nginx/uwsgi_temp;
    scgi_temp_path /var/cache/nginx/scgi_temp;

    # Gzip 压缩配置
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    gzip_disable "MSIE [1-6]\.";

    # Brotli 压缩配置（如果支持）
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # 缓存配置
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    # 连接配置
    reset_timedout_connection on;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    keepalive_requests 1000;

    # 速率限制
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m rate=20;

    # 上游服务器配置（负载均衡）
    upstream fastapi_backend {
        least_conn;
        server backend1:8002 weight=3 max_fails=3 fail_timeout=30s;
        server backend2:8002 weight=2 max_fails=3 fail_timeout=30s;
        server backend3:8002 weight=1 max_fails=3 fail_timeout=30s backup;

        keepalive 32;
    }

    # 缓存路径配置
    proxy_cache_path /var/cache/nginx/proxy_cache levels=1:2 keys_zone=api_cache:100m inactive=60m use_temp_path=off max_size=10g;
    proxy_cache_path /var/cache/nginx/static_cache levels=1:2 keys_zone=static_cache:50m inactive=24h use_temp_path=off max_size=5g;

    # 主服务器配置
    server {
        listen 80;
        listen [::]:80;
        server_name asset-management.example.com www.asset-management.example.com;

        # HTTP 到 HTTPS 重定向
        return 301 https://$server_name$request_uri;
    }

    # HTTPS 主配置
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name asset-management.example.com www.asset-management.example.com;

        # SSL 证书配置
        ssl_certificate /etc/ssl/certs/asset-management.crt;
        ssl_certificate_key /etc/ssl/private/asset-management.key;
        ssl_trusted_certificate /etc/ssl/certs/chain.crt;

        # SSL 优化配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # 安全头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 根路径重定向到 API
        location = / {
            return 302 /api/v1/;
        }

        # API 路由
        location /api/ {
            # 速率限制
            limit_req zone=api_limit burst=50 nodelay;

            # 代理配置
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Proto-SSL $ssl;
            proxy_set_header X-Request-ID $request_id;

            # 缓存配置
            proxy_cache api_cache;
            proxy_cache_key $scheme$proxy_method$host$request_uri;
            proxy_cache_valid 200 302 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_bypass $http_pragma $http_authorization;
            proxy_no_cache $http_pragma $http_authorization;

            # 超时配置
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # 错误处理
            proxy_intercept_errors on;
            error_page 502 503 504 /api/v1/health;
        }

        # 文件上传专用配置
        location /api/v1/pdf-import/upload {
            # 上传速率限制
            limit_req zone=upload_limit burst=5 nodelay;

            # 连接限制
            limit_conn zone=conn_limit addr=$binary_remote_addr;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;

            # 上传专用配置
            client_max_body_size 100M;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # 不缓存上传请求
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # 前端静态文件
        location / {
            alias /var/www/asset-management/dist/;

            # 静态文件缓存
            expires 1y;
            add_header Cache-Control "public, immutable";

            # 尝试静态文件，不存在则返回 index.html
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存
        location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
            root /var/www/asset-management/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;

            # 启用静态文件缓存
            access_log off;
            log_not_found off;
        }

        # PDF 文件预览
        location /api/v1/assets/*/preview {
            proxy_pass http://fastapi_backend;

            # PDF 预览专用配置
            proxy_cache static_cache;
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;

            # CORS 配置（如果需要跨域预览）
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
        }

        # 健康检查
        location /api/v1/health {
            proxy_pass http://fastapi_backend;
            access_log off;
        }

        # 监控端点
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }

        # 禁止访问敏感文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ^/(config|\.env|\.git) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # 管理后台（仅内网访问）
    server {
        listen 8080;
        server_name localhost 127.0.0.1;

        location / {
            proxy_pass http://fastapi_backend;

            # 管理后台特殊配置
            client_max_body_size 200M;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }

    # 错误页面配置
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        root /var/www/asset-management/error-pages;
        internal;
    }

    location = /50x.html {
        root /var/www/asset-management/error-pages;
        internal;
    }
}